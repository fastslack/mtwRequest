name: Bug Report
description: Report a bug in mtwRequest
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Create a server with...
        2. Connect a client...
        3. Send a message...
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mtwRequest Version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: crate
    attributes:
      label: Affected Crate
      options:
        - mtw-core
        - mtw-protocol
        - mtw-transport
        - mtw-router
        - mtw-ai
        - mtw-auth
        - mtw-http
        - mtw-state
        - mtw-codec
        - mtw-integrations
        - mtw-registry
        - mtw-sdk
        - mtw-test
        - "@mtw/client"
        - "@mtw/react"
        - "@mtw/svelte"
        - "@mtw/vue"
        - "@mtw/three"
        - Other

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      placeholder: "rustc 1.80.0"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.0 / Ubuntu 24.04 / Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Relevant log output (set RUST_LOG=debug for more detail)
      render: shell
