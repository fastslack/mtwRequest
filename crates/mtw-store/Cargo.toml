[package]
name = "mtw-store"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "mtwRequest data store — native SQLite access with connection pooling"

[dependencies]
mtw-core = { workspace = true }
