r2d2_sqlite = { workspace = true }

# Utilities
tracing = { workspace = true }
dashmap = { workspace = true }
seahash = { workspace = true }
toml = { workspace = true }
base64 = "0.22"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
